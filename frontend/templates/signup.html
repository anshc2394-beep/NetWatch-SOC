<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | NetWatch SOC</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    }
    .auth-card {
      background: var(--bg-glass); border: 1px solid var(--border);
      padding: 3rem; border-radius: var(--radius-md); width: 100%; max-width: 400px;
      backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .auth-title { font-size: 2rem; font-weight: 700; margin-bottom: 2rem; text-align: center; color: var(--text-primary); }
    .auth-form .form-group { margin-bottom: 1.5rem; }
    .btn-auth {
      width: 100%; padding: 1rem; background: var(--accent-cyan); color: #000;
      border: none; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer;
      transition: var(--transition); font-size: 1rem; margin-top: 1rem;
    }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-2px); }
    .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-primary); text-decoration: none; font-weight: 600; }
    .flash-msgs { margin-bottom: 1.5rem; color: var(--accent-red); font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-title">Create Account</div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-msgs">
          {% for message in messages %}
            <div>{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form class="auth-form" method="POST">
      <div class="form-group">
        <label class="form-label" style="display:block; margin-bottom:0.5rem">Username</label>
        <input type="text" name="username" class="form-input" required placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label class="form-label" style="display:block; margin-bottom:0.5rem">Password</label>
        <input type="password" name="password" class="form-input" required placeholder="Create a password">
      </div>
      <button type="submit" class="btn-auth">Join Now</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</body>
</html>
